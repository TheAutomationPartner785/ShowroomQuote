<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowroomQuote</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      text-align: center;
      padding: 1.5rem;
    }
    h1 {
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 800;
      margin: 0;
      line-height: 1.2;
    }
    p {
      margin-top: 1rem;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main>
    <h1>Creado desde GitHub Pages</h1>
    <p>Deploy funcionando correctamente ✅</p>
  </main>
</body>
</html>
